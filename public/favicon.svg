<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="spark" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34AAFF"/>
      <stop offset="45%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <linearGradient id="specular" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Near-black rounded square background -->
  <rect width="32" height="32" rx="7" fill="#080810"/>
  <!-- Subtle rim -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.75"/>
  <!-- 4-pointed spark mark -->
  <path d="M16 4 L19.5 12.5 L28 16 L19.5 19.5 L16 28 L12.5 19.5 L4 16 L12.5 12.5 Z" fill="url(#spark)"/>
  <!-- Upper-left specular -->
  <path d="M16 4 L19.5 12.5 L28 16 L19.5 19.5 L16 28 L12.5 19.5 L4 16 L12.5 12.5 Z" fill="url(#specular)"/>
</svg>
