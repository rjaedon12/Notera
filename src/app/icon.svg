<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Apple squircle clip: rx=115 ≈ 22.5% of 512, matching iOS icon rounding -->
    <clipPath id="icon-clip">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>

    <!-- Background deep-navy gradient (top-left lighter → bottom-right darker) -->
    <linearGradient id="bg" x1="56" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#1C3658"/>
      <stop offset="0.55" stop-color="#112B4A"/>
      <stop offset="1"    stop-color="#091D36"/>
    </linearGradient>

    <!-- Radial glow in upper-left area -->
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(164 120) rotate(42.5) scale(336 368)">
      <stop offset="0"    stop-color="#5A7FA9" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#456B94" stop-opacity="0.12"/>
      <stop offset="1"    stop-color="#091B32" stop-opacity="0"/>
    </radialGradient>

    <!-- N ribbon main fill (white → light steel) -->
    <linearGradient id="ribbon-fill" x1="132" y1="108" x2="428" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#F8FCFF"/>
      <stop offset="0.45" stop-color="#E7EFF6"/>
      <stop offset="1"    stop-color="#C8D6E3"/>
    </linearGradient>

    <!-- N ribbon specular highlight -->
    <linearGradient id="ribbon-highlight" x1="152" y1="144" x2="348" y2="328" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="1"    stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>

    <!-- N ribbon depth shadow fill -->
    <linearGradient id="ribbon-shadow-fill" x1="184" y1="190" x2="414" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#0D1E34" stop-opacity="0.44"/>
      <stop offset="1"    stop-color="#061120" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Drop shadow for the N ribbon -->
    <filter id="ribbon-drop" x="60" y="80" width="460" height="400"
      filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="18" flood-color="#020711" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Everything clipped to Apple squircle shape -->
  <g clip-path="url(#icon-clip)">

    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#glow)"/>

    <!-- Subtle frosted inner border -->
    <rect x="1.5" y="1.5" width="509" height="509" rx="113.5"
      fill="none" stroke="#7F9DBE" stroke-opacity="0.20" stroke-width="3"/>

    <!-- Left pillar side-plane depth (gives 3D slab feel) -->
    <path d="M144 228 C144 178 178 144 218 144
             C198 160 190 180 190 204
             V302
             C190 326 180 348 164 366
             C150 352 144 332 144 312 Z"
      fill="#DDE8F1" fill-opacity="0.55"/>

    <!-- Right pillar side-plane depth -->
    <path d="M394 154 C416 166 428 188 428 214
             V308
             C428 330 416 348 396 360
             C384 348 378 332 378 312
             V202 C378 184 384 168 394 154 Z"
      fill="#D7E3ED" fill-opacity="0.50"/>

    <!-- N ambient shadow (depth layer below ribbon) -->
    <path d="M152 356 V194
             C152 158 194 138 218 166
             L356 330
             C380 360 428 342 428 302
             V166"
      fill="none"
      stroke="url(#ribbon-shadow-fill)"
      stroke-width="88"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.85"/>

    <!-- N ribbon — main fill + specular highlight -->
    <g filter="url(#ribbon-drop)">
      <path d="M152 356 V194
               C152 158 194 138 218 166
               L356 330
               C380 360 428 342 428 302
               V166"
        fill="none"
        stroke="url(#ribbon-fill)"
        stroke-width="72"
        stroke-linecap="round"
        stroke-linejoin="round"/>
      <path d="M152 356 V194
               C152 158 194 138 218 166
               L356 330
               C380 360 428 342 428 302
               V166"
        fill="none"
        stroke="url(#ribbon-highlight)"
        stroke-width="27"
        stroke-linecap="round"
        stroke-linejoin="round"/>
    </g>

    <!-- Four-pointed sparkle (bottom-right corner detail) -->
    <g transform="translate(426,424)" opacity="0.87">
      <path d="M0,-19 L4.5,-4.5 L19,0 L4.5,4.5 L0,19 L-4.5,4.5 L-19,0 L-4.5,-4.5 Z"
        fill="white"/>
    </g>

  </g>
</svg>
